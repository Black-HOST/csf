name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.scan.outputs.tests }}
    steps:
      - uses: actions/checkout@v4
      - id: scan
        run: echo "tests=$(find .github/tests -name '*.t' -type f | sort | xargs -n1 basename | jq -R -s -c 'split("\n") | map(select(length > 0))')" >> "$GITHUB_OUTPUT"

  unit:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.discover.outputs.tests) }}
    name: "${{ matrix.test }}"
    steps:
      - uses: actions/checkout@v4
      - run: prove -v "$(find .github/tests -name '${{ matrix.test }}' -type f)"

  uninstall:
    name: "Uninstall – ${{ matrix.os-name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os-name: "Ubuntu 24.04"
            container: "ubuntu:24.04"
            setup-cmd: >-
              apt-get update && apt-get install -y
              wget curl tar perl libwww-perl liblwp-protocol-https-perl libgd-graph-perl iptables host unzip sendmail

    container:
      image: ${{ matrix.container }}
      options: --privileged

    steps:
      - name: Install OS dependencies
        if: ${{ matrix.setup-cmd }}
        run: ${{ matrix.setup-cmd }}

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install CSF from source
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          sh install.sh

      - name: Run uninstaller
        shell: bash
        run: |
          set -uo pipefail
          cd "$GITHUB_WORKSPACE"
          bash uninstall.sh
